description: >
  Manual overrides for resolved white-dwarf companions where catalogue
  photometry is incomplete, blended, or not present in Gaia DR3 source rows
  used by the pipeline.

notes: >
  Coordinates are pinned to the pipeline canonical epoch J2016.0. For visual
  binaries, companion positions use published orbit solutions projected to
  J2016.0 and anchored to the corresponding primary position used by the
  pipeline. Distances use binary/system parallaxes where they are more
  appropriate than single-component catalogue parallaxes; photometry and
  effective temperatures are taken from resolved HST studies.

stars:
  - override_id: manual.sirius_b.replace.v1
    action: replace
    source: gaia
    source_id: 2947050466531873024
    override_reason: weak_catalogue_photometry_for_resolved_white_dwarf
    override_policy_version: bond2017_j2016_v2

    ra_deg: 101.2875945165
    dec_deg: -16.7208406064
    r_pc: 2.6392187912
    mag_abs: 11.4206
    teff: 25193
    notes: >
      Gaia DR3 source_id is retained as the component identity, but the
      override astrometry is binary-solution based. Position is Sirius B at
      J2016.0 from the Bond et al. (2017) visual orbit projected relative to
      the pipeline-propagated Sirius A position (rho = 10.567 arcsec,
      PA = 75.97 deg). Distance uses the Bond et al. adopted Sirius system
      parallax, 378.9 +/- 1.4 mas. The photometric/temperature inputs are from
      Barstow et al. (2005, HST/STIS Balmer-line analysis), using
      Teff = 25193 K and resolved V = 8.528 +/- 0.05; mag_abs is recomputed
      from that V magnitude and the adopted system distance.

  - override_id: manual.procyon_b.replace.v1
    action: add
    source: manual
    source_id: procyon_b
    override_reason: missing_from_gaia_dr3_resolved_white_dwarf
    override_policy_version: bond2015_j2016_v2

    ra_deg: 114.8212817631
    dec_deg: 5.2208854402
    r_pc: 3.5087719298
    mag_abs: 13.0942
    teff: 7740
    notes: >
      Position is Procyon B at J2016.0 from the Bond et al. (2015) visual
      orbit projected relative to the pipeline-propagated Procyon A position
      (rho = 4.108 arcsec, PA = 296.32 deg). Distance uses the Bond et al.
      weighted-mean Procyon system parallax, 285.0 +/- 0.7 mas. Resolved
      white-dwarf photometry and temperature are from Provencal et al. (2002,
      HST/STIS), commonly summarised in Bond et al. (2015) as
      V = 10.82 +/- 0.03 and Teff = 7740 +/- 50 K; mag_abs is recomputed from
      that V magnitude and the adopted system distance.
